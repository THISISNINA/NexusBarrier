{% extends "auth_base.html" %} {% block title %}Platform Sign In{% endblock %}
{% block content %}
<div class="panel">
  <h2>Platform Console</h2>
  <form method="POST" action="{{ url_for('platform_login') }}" autocomplete="off">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="form-group">
      <label for="username">Username <span class="required">*</span></label>
      <input
        type="text"
        id="username"
        name="username"
        autocapitalize="off"
        autocomplete="username"
        required
      />
    </div>

    <div class="form-group">
      <label for="password">Password <span class="required">*</span></label>
      <input
        type="password"
        id="password"
        name="password"
        autocomplete="current-password"
        required
      />
    </div>

    <div
      class="form-actions"
      style="flex-direction: column; align-items: stretch"
    >
      <button
        type="submit"
        class="btn btn-primary"
        style="justify-content: center"
      >
        Sign In
      </button>
    </div>
  </form>
</div>

<p class="auth-footnote subtle">
  Infrastructure operators only. Tenant users
  <a href="{{ url_for('login') }}">sign in here</a>.
</p>
{% endblock %}
